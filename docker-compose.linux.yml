# =============================================================================
# docker-compose.linux.yml — Linux 部署专用配置
# 部署目标：192.168.0.181（els 账户），Docker standalone 模式
#
# 与 Windows 版 docker-compose.yml 的主要差异：
#   1. mem_limit 使用顶层语法（standalone compose 兼容，无需 deploy.resources）
#   2. db-backup 容器内置 cron 调度（不依赖 Windows Task Scheduler）
#   3. ssl 目录 volume mount 到 app 容器（支持 HTTPS）
#   4. NAS 同步由容器内 smbclient 完成（替代 robocopy）
#   5. MySQL 不对外暴露端口（仅容器内网访问，提升安全性）
#
# 启动命令：
#   docker compose -f docker-compose.linux.yml up -d --build
# =============================================================================

services:
  # ─── MySQL 数据库 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: device-manager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: device_management
      MYSQL_USER: device_user
      MYSQL_PASSWORD: device_pass_123
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    # 映射到宿主机，允许局域网直连（DBeaver 等工具访问）
    ports:
      - "3306:3306"
    networks:
      - device-manager-network
    # 性能调优参数（与 Windows 版一致）
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --slow-query-log=ON
      --long-query-time=2
      --slow-query-log-file=/var/lib/mysql/slow.log
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    # 内存限制（standalone compose 顶层语法）
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "device_user", "-pdevice_pass_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── 应用服务 ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: device-manager-app:latest
    container_name: device-manager-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: device_user
      DB_PASSWORD: device_pass_123
      DB_NAME: device_management
      OSS_REGION: ${OSS_REGION:-oss-cn-shanghai}
      OSS_BUCKET: ${OSS_BUCKET:-els-pub-04}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BASE_PATH: ${OSS_BASE_PATH:-static/After-sales management system}
      USE_OSS_STORAGE: ${USE_OSS_STORAGE:-false}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOGIN_USERNAME: ${LOGIN_USERNAME:-elsvision}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-elsvisiongo666}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SYSTEM_BASE_URL: ${SYSTEM_BASE_URL:-http://192.168.0.181:5000}
    volumes:
      - ./uploads:/app/uploads
      - ./ssl:/app/ssl:ro          # SSL 证书（只读挂载，有证书则自动启用 HTTPS）
    ports:
      - "5000:5000"                # HTTP
      - "5001:5001"                # HTTPS（有 SSL 证书时自动启用）
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - device-manager-network

  # ─── 数据库备份容器 ───────────────────────────────────────────────────────────
  # Linux 版：容器内 cron 调度，无需宿主机计划任务
  #   每日 01:00 → mysqldump 全量备份 → /backups/（本地保留 7 天）
  #   每日 02:00 → smbclient 同步到 NAS（NAS 保留 14 天）
  db-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    image: device-manager-backup:latest
    container_name: device-manager-db-backup
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: device_user
      MYSQL_PASSWORD: device_pass_123
      MYSQL_DATABASE: device_management
      TZ: Asia/Shanghai
      BACKUP_RETAIN_DAYS: 7
      NAS_HOST: 192.168.0.50
      NAS_SHARE: jhzhu
      NAS_DIR: After-sales-service
      NAS_USER: jhzhu
      NAS_PASS: Zhujiahao123
      NAS_RETAIN_DAYS: 14
    volumes:
      - ./backups:/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - device-manager-network

volumes:
  mysql_data:
    external: true          # 使用已有 volume，不自动创建（避免覆盖生产数据）
    name: device-manager_mysql_data

networks:
  device-manager-network:
    driver: bridge
