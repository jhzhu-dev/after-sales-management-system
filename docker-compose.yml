services:
  # ─── MySQL 数据库 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: device-manager-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: device_management
      MYSQL_USER: device_user
      MYSQL_PASSWORD: device_pass_123
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"  # 映射到3307避免与本地MySQL冲突
    networks:
      - device-manager-network
    # 性能调优参数
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --slow-query-log=ON
      --long-query-time=2
      --slow-query-log-file=/var/lib/mysql/slow.log
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    # 资源限制：防止 OOM 冲击宿主机
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "device_user", "-pdevice_pass_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── 应用服务 ─────────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: device-manager-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: device_user
      DB_PASSWORD: device_pass_123
      DB_NAME: device_management
      # 阿里云 OSS 配置
      OSS_REGION: ${OSS_REGION:-oss-cn-shanghai}
      OSS_BUCKET: ${OSS_BUCKET:-els-pub-04}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BASE_PATH: ${OSS_BASE_PATH:-static/After-sales management system}
      USE_OSS_STORAGE: ${USE_OSS_STORAGE:-false}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOGIN_USERNAME: ${LOGIN_USERNAME:-elsvision}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-elsvisiongo666}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - device-manager-network

  # ─── 数据库备份容器 ───────────────────────────────────────────────────────────
  # 提供 mysqldump 工具环境，容器本身保持常驻（sleep infinity）
  # 备份调度由 Windows 计划任务（setup-backup-task.ps1 注册）负责：
  #   每日 01:00 → docker exec device-manager-db-backup /bin/bash /backup.sh
  #   每日 02:00 → .\backup.ps1 同步到 NAS
  db-backup:
    image: mysql:8.0
    container_name: device-manager-db-backup
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: device_user
      MYSQL_PASSWORD: device_pass_123
      MYSQL_DATABASE: device_management
      TZ: Asia/Shanghai
      BACKUP_RETAIN_DAYS: 7
    volumes:
      - ./backups:/backups
      - ./scripts/backup-entrypoint.sh:/backup.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - device-manager-network
    # 容器保持常驻，调度由宿主机 Windows 计划任务完成
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        chmod +x /backup.sh
        echo "=== DB Backup container ready. Triggered externally by Windows Task Scheduler ==="
        sleep infinity

volumes:
  mysql_data:
    driver: local

networks:
  device-manager-network:
    driver: bridge
